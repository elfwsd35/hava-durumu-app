<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hava Durumu</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #6b21a8, #15803d, #0f766e);
      background-size: 200% 200%;
      animation: gradientHareket 12s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
    }

    @keyframes gradientHareket {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(30, 27, 75, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 36px 24px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      width: 90%;
      max-width: 340px;
      text-align: center;
      color: white;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 28px;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.5px;
      color: #ffffff;
      background: linear-gradient(135deg, #16a34a, #15803d);
      padding: 10px 16px;
      border-radius: 12px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4);
    }

    .arama {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    @media (max-width: 360px) {
      .arama {
        flex-direction: column;
      }
    }

    input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 14px;
      font-family: inherit;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.25);
    }

    button {
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.25);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.15s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-1px);
    }

    #havaSonuc {
      font-size: 16px;
      line-height: 1.8;
      font-weight: 500;
    }

    #havaSonuc h2 {
      margin-bottom: 14px;
      font-weight: 700;
      font-size: 20px;
      color: white;
      background: linear-gradient(135deg, #16a34a, #15803d);
      padding: 8px 12px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4);
    }

    .hata {
      color: #fecaca;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hava Durumu</h1>

    <div class="arama">
      <input type="text" id="sehirInput" placeholder="Şehir adı (örn: Izmir)">
      <button id="havaBtn">Göster</button>
    </div>

    <div id="havaSonuc"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
